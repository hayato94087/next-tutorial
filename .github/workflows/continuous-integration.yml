name: Continuous Integration

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm run lint
        env:
          DEBUG_URL: ${{ vars.DUMMY_DEBUG_URL }}

      - name: Format check
        run: pnpm run format

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          DEBUG_URL: ${{ vars.DUMMY_DEBUG_URL }}
